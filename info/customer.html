<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>정보관리 > 고객관리</title>

  <link rel="stylesheet" href="../common.css">
  <script defer src="../common.js"></script>

  <style>
    /* 페이지 전용(최소) */
    .titlebar{
      background:#1f6fb2;
      color:#fff;
      padding:18px 18px;
      border-radius:14px;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
      margin-bottom:12px;
      font-weight:900;
      letter-spacing:-.2px;
    }
    .titlebar .crumb{ font-size:18px; }

    .toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .toolbar-left{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      width:100%;
    }
    .select{
      height:36px;
      border:1px solid #d8dee6;
      border-radius:10px;
      padding:0 10px;
      background:#fff;
      font-size:13px;
      min-width:140px;
      outline:none;
    }
    .searchbox{
      display:flex;
      align-items:center;
      gap:8px;
      border:1px solid #d8dee6;
      border-radius:10px;
      padding:0 10px;
      height:36px;
      background:#fff;
      min-width:420px;
      flex: 1 1 420px;
    }
    .searchbox input{
      border:0;
      outline:0;
      width:100%;
      font-size:13px;
      background:transparent;
    }
    .btn-search{
      height:36px;
      padding:0 14px;
      border-radius:10px;
      border:1px solid #1f6fb2;
      background:#1f6fb2;
      color:#fff;
      cursor:pointer;
      font-weight:900;
      font-size:13px;
      white-space:nowrap;
    }
    .btn-search:hover{ filter:brightness(.95); }

    .grid-wrap{
      border:1px solid #e6ebf2;
      border-radius:14px;
      overflow:hidden;
      background:#fff;
    }
    table{
      width:100%;
      border-collapse:collapse;
    }
    thead th{
      background:#f7f9fc;
      font-weight:900;
      font-size:13px;
      padding:10px 10px;
      border-bottom:1px solid #eef2f7;
      text-align:left;
      white-space:nowrap;
    }
    tbody td{
      font-size:13px;
      padding:10px 10px;
      border-bottom:1px solid #eef2f7;
      white-space:nowrap;
      vertical-align:middle;
    }
    tbody tr:hover{ background:#fafcff; }

    .num{ width:70px; }
    .link{
      color:#1f6fb2;
      text-decoration:none;
      font-weight:800;
    }
    .link:hover{ text-decoration:underline; }

    .addr{
      max-width:420px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .empty{
      padding:18px;
      color:#6b7280;
      font-size:13px;
    }

    @media (max-width: 860px){
      .searchbox{ min-width: 240px; }
      .addr{ max-width: 220px; }
    }
  </style>
</head>

<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand" onclick="location.href='../index.html'">
      <div class="logo">◎</div>
      <div>ERP UI</div>
    </div>

    <!-- 공통 nav 삽입 -->
    <div id="nav-container"></div>

    <div class="userbox">H.Q / 안현모</div>
  </div>
</header>

<main class="app">
  <div class="titlebar">
    <div class="crumb">정보관리 &gt; 고객관리</div>
  </div>

  <section class="panel">
    <div class="panel-head">
      <div>
        <div class="panel-title">고객관리</div>
      </div>
    </div>

    <div class="panel-body">
      <div class="toolbar">
        <div class="toolbar-left">
          <select class="select" id="branch">
            <option value="공장">공장</option>
            <option value="1000">TPS</option>
            <option value="2000">GRP</option>
            <option value="3000">PM</option>
          </select>
          <select class="select" id="branch">
            <option value="거래처명">거래처명(n개동시체크가능)</option>
          </select>

          <div class="searchbox">
            <input id="q" type="text" placeholder="고객명, 거래처명으로 검색" />
          </div>

          <button class="btn-search" id="btnSearch">조회</button>
        </div>
      </div>

      <div class="grid-wrap">
        <table aria-label="고객명 조회 결과">
          <thead>
            <tr>
              <th class="num">#</th>
              <th>거래처명</th>
              <th>거래처담당자</th>
              <th>부서</th>
              <th>직책</th>
              <th>이메일</th>
              <th>연락처</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="7" class="empty">
                조회 조건을 입력한 후 <b>조회</b>를 눌러주세요.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </section>
</main>

<script>
  // 조회 눌렀을 때 보여줄 "예시 결과" (프로토타입용)
 const sampleRows = [
  { no: 51622, corp:"제이에스티나", customer:"홍길동", dept:"영업팀", position:"대리", email:"hong@test.com", phone:"010-1234-5678" },
  { no: 51621, corp:"라인플러스 주식회사", customer:"배소현", dept:"마케팅팀", position:"사원", email:"bae@test.com", phone:"010-2345-6789" },
  { no: 51620, corp:"영진약품 주식회사", customer:"김나연", dept:"구매팀", position:"과장", email:"kimny@test.com", phone:"010-3456-7890" },
  { no: 51619, corp:"시립서울청소년센터", customer:"안세은", dept:"운영팀", position:"대리", email:"ahn@test.com", phone:"010-4567-8901" },
  { no: 51618, corp:"삼성화재해상보험(주)", customer:"김홍진", dept:"보험영업팀", position:"차장", email:"khj@test.com", phone:"010-5678-9012" },
  { no: 51617, corp:"서울교육대학교", customer:"전찬용", dept:"행정팀", position:"주임", email:"jeon@test.com", phone:"010-6789-0123" },
  { no: 51616, corp:"핀인사이트", customer:"강우진", dept:"개발팀", position:"팀장", email:"kang@test.com", phone:"010-7890-1234" },
  { no: 51615, corp:"라이나생명보험(주)", customer:"김민영", dept:"CS팀", position:"사원", email:"kmy@test.com", phone:"010-8901-2345" },
  { no: 51614, corp:"레벨스_인크(영업소)", customer:"김서연", dept:"영업1팀", position:"대리", email:"ksy@test.com", phone:"010-9012-3456" },
  { no: 51613, corp:"주식회사 그레이바랩", customer:"이범기", dept:"기획팀", position:"과장", email:"lee@test.com", phone:"010-0123-4567" },
  { no: 51612, corp:"(주) 썰트리온", customer:"정재영", dept:"연구소", position:"책임연구원", email:"jung@test.com", phone:"010-1111-2222" },
  { no: 51611, corp:"주식회사 포스코인재창조원", customer:"공승규", dept:"교육팀", position:"차장", email:"gong@test.com", phone:"010-2222-3333" },
  { no: 51610, corp:"하나캐피탈(주)", customer:"손정연", dept:"금융영업팀", position:"대리", email:"son@test.com", phone:"010-3333-4444" },
  { no: 51609, corp:"한스바이오메드(주)", customer:"윤지환", dept:"영업팀", position:"사원", email:"yoon@test.com", phone:"010-4444-5555" },
  { no: 51608, corp:"에이블현대호텔앤리조트 주식회사", customer:"김경진", dept:"운영팀", position:"과장", email:"kkj@test.com", phone:"010-5555-6666" }
];


  const tbody = document.getElementById("tbody");
  const branchEl = document.getElementById("branch");
  const qEl = document.getElementById("q");
  const btn = document.getElementById("btnSearch");

  function render(list){
    tbody.innerHTML = "";

    if (!list.length){
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="7" class="empty">조회 결과가 없습니다.</td>`;
      tbody.appendChild(tr);
      return;
    }

    list.forEach(r => {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="num">${r.no}</td>
    <td><a class="link" href="#" onclick="return false;">${r.corp}</a></td>
    <td>${r.customer}</td>
    <td>${r.dept}</td>
    <td>${r.position}</td>
    <td>${r.email}</td>
    <td>${r.phone || ""}</td>
  `;
  tbody.appendChild(tr);
});
  }

  function doSearch(){
    const branch = branchEl.value;
    const q = qEl.value.trim().toLowerCase();

    // 프로토타입: branch는 “느낌만” 반영 (샘플에 branch가 없어서)
    // 대신 키워드로 필터만 해줌
    let list = sampleRows.slice();

    if (q){
      list = list.filter(r => {
        const hay = `${r.gubun} ${r.biz} ${r.corp} ${r.customer} ${r.branch} ${r.phone} ${r.registrar} ${r.regDt}`.toLowerCase();
        return hay.includes(q);
      });
    }

    // branch가 전체/거래지점이면 그냥 통과 (시연용)
    render(list);
  }

  btn.addEventListener("click", doSearch);
  qEl.addEventListener("keydown", (e)=>{ if(e.key==="Enter") doSearch(); });
</script>
</body>
</html>
