<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ERP UI - 선매출입력</title>

<link rel="stylesheet" href="../common.css">
<script defer src="../common.js"></script>

<style>

/* 입력폼 grid */
.form-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:14px 24px;
}

.form-field{
  display:flex;
  align-items:center;
  gap:10px;
}

.form-field label{
  width:110px;
  font-weight:600;
  font-size:13px;
  color:#333;
}

.form-field input,
.form-field select{
  flex:1;
}

.form-field.full{
  grid-column:1 / -1;
}

.search-box{
  display:flex;
  gap:6px;
}

textarea{
  width:100%;
  height:70px;
  border:1px solid #d1d5db;
  border-radius:8px;
  padding:8px;
  font-size:13px;
}

</style>
</head>

<body>

<header class="topbar">
<div class="topbar-inner">
<div class="brand" onclick="location.href='index.html'">
<div class="logo">◎</div>
<div>SM Module</div>
</div>
<div id="nav-container"></div>
<div class="userbox">H.Q / 안현모</div>
</div>
</header>

<main class="app">

<div class="titlebar">
<div class="crumb">매출관리 &gt; 선매출입력</div>
</div>

<section class="panel">

<div class="panel-head">
<div class="panel-title">선매출 등록</div>
<div class="tools">
<button class="btn primary">저장</button>
</div>
</div>

<div class="panel-body">

<div class="form-grid">

<div class="form-field">
<label>영업부서 *</label>
<select>
<option>영업부서 선택</option>
<option>그래픽스사업본부</option>
<option>PM사업본부</option>
<option>국내사업본부</option>
</select>
</div>

<div class="form-field">
<label>등록자명 *</label>
<input type="text" value="안현모" disabled>
</div>

<div class="form-field">
<label>영업거래처 *</label>
<div class="search-box">
<input type="text" placeholder="거래처 검색">
<button class="btn">검색</button>
</div>
</div>

<div class="form-field">
<label>영업담당자 *</label>
<div class="search-box">
<input type="text" placeholder="담당자 검색">
<button class="btn">검색</button>
</div>
</div>

<div class="form-field">
<label>선매출액 *</label>
<input type="number" placeholder="선매출액">
</div>

<div class="form-field">
<label>과세구분 *</label>
<select>
<option>과세</option>
<option>영세</option>
<option>면세</option>
</select>
</div>

<div class="form-field">
<label>주문검색</label>
<button class="btn primary">주문가지고오기</button>
</div>

<div class="form-field full">
<label>비고</label>
<textarea placeholder="비고 입력"></textarea>
</div>

</div>

</div>

</section>

</main>

</body>
</html>
