<div class="oc-form">

  <div class="oc-field">
    <div class="oc-label oc-req">영업부서</div>
    <select class="oc-ctl">
      <option>영업부서 선택</option>
      <option>그래픽스사업본부</option>
      <option>PM사업본부</option>
      <option>국내사업본부</option>
    </select>
  </div>

  <div class="oc-field">
    <div class="oc-label oc-req">등록자명</div>
    <input class="oc-ctl" value="안현모" disabled>
  </div>

  <div class="oc-field">
    <div class="oc-label oc-req">영업거래처</div>
    <div class="oc-row">
      <input class="oc-ctl" placeholder="거래처 검색">
      <button class="oc-mini" type="button">≡</button>
    </div>
  </div>

  <div class="oc-field">
    <div class="oc-label oc-req">영업담당자</div>
    <div class="oc-row">
      <input class="oc-ctl" placeholder="담당자 검색">
      <button class="oc-mini" type="button">≡</button>
    </div>
  </div>

  <div class="oc-field">
    <div class="oc-label oc-req">선매출액</div>
    <input class="oc-ctl" type="number" placeholder="선매출액">
  </div>

  <div class="oc-field">
    <div class="oc-label oc-req">과세구분</div>
    <select class="oc-ctl">
      <option>과세</option>
      <option>영세</option>
      <option>면세</option>
    </select>
  </div>

  <div class="oc-field">
    <div class="oc-label">주문검색</div>
    <button class="oc-btn ghost" type="button">주문가지고오기</button>
  </div>

  <div class="oc-field" style="grid-column:1/-1;">
    <div class="oc-label">비고</div>
    <textarea class="oc-ctl oc-textarea" placeholder="비고"></textarea>
  </div>

</div>
