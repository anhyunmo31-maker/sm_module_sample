<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP UI - 선매출입력</title>

  <link rel="stylesheet" href="../common.css">
  <script defer src="../common.js"></script>
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand" onclick="location.href='index.html'">
      <div class="logo">◎</div>
      <div>SM Module</div>
    </div>
    <div id="nav-container"></div>
    <div class="userbox">H.Q / 안현모</div>
  </div>
</header>

<main class="app">

  <div class="titlebar">
    <div class="crumb">매출관리 &gt; 선매출입력</div>
  </div>

  <section class="panel">

    <div class="panel-head">
      <div class="panel-title">선매출 등록</div>
      <div class="tools">
        <button class="btn primary">저장</button>
      </div>
    </div>

    <div class="panel-body">

      <!-- 입력폼 -->
      <div class="row">

        <div class="field">
          <strong>영업부서 *</strong>
          <select>
            <option>영업부서 선택</option>
            <option>그래픽스사업본부</option>
            <option>PM사업본부</option>
            <option>국내사업본부</option>
          </select>
        </div>

        <div class="field">
          <strong>등록자명 *</strong>
          <input type="text" value="안현모" disabled>
        </div>

      </div>

      <div class="row">

        <div class="field">
          <strong>영업거래처 *</strong>
          <div style="display:flex; gap:6px;">
            <input type="text" placeholder="거래처 검색">
            <button class="btn">검색</button>
          </div>
        </div>

        <div class="field">
          <strong>영업담당자 *</strong>
          <div style="display:flex; gap:6px;">
            <input type="text" placeholder="담당자 검색">
            <button class="btn">검색</button>
          </div>
        </div>

      </div>

      <div class="row">

        <div class="field">
          <strong>선매출액 *</strong>
          <input type="number" placeholder="선매출액">
        </div>

        <div class="field">
          <strong>과세구분 *</strong>
          <select>
            <option>과세</option>
            <option>영세</option>
            <option>면세</option>
          </select>
        </div>

      </div>

      <div class="row">

        <div class="field">
          <strong>주문검색</strong>
          <button class="btn primary">주문가지고오기</button>
        </div>

      </div>

      <div class="row">

        <div class="field" style="width:100%">
          <strong>비고</strong>
          <textarea rows="3" placeholder="비고 입력"></textarea>
        </div>

      </div>

    </div>

  </section>

</main>

</body>
</html>
