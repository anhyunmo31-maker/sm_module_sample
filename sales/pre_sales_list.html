<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP UI - 선매출목록</title>
  <link rel="stylesheet" href="../common.css">
  <script defer src="../common.js"></script>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand" onclick="location.href='index.html'">
      <div class="logo">◎</div>
      <div>SM Module</div>
    </div>
    <div id="nav-container"></div>
    <div class="userbox">H.Q / 안현모</div>
  </div>
</header>

<main class="app">
 <div class="titlebar">
    <div class="crumb">매출관리 &gt; 선매출목록</div>
  </div>

  <section class="panel">
    <div class="panel-head">
      <div class="panel-title">선매출목록</div>
      <div class="tools">
        <button class="btn primary">선매출 등록</button>
        <button class="btn primary">엑셀다운로드</button>
      </div>
    </div>

    <div class="panel-body">
      <div class="row">
        <div class="field"><strong style="font-size:12px;color:#555">기간</strong><input type="date" value="2026-01-30"></div>
        <div class="field"><input type="date" value="2026-01-30"></div>
        <!-- 🔽 부서 선택 -->
        <div class="field select-field" style="min-width:160px">
          <select>
            <option value="">부서 전체</option>
            <option value="1">강남파트</option>
            <option value="2">시청파트</option>
            <option value="3">서소문파트</option>
            <option value="4">역삼1파트</option>
          </select>
        </div>
        <div class="field" style="min-width:260px"><input type="text" placeholder="거래처명, 회사명으로 검색" style="width:100%"></div>
        <button class="btn">검색</button>
      </div>

      <table class="table">
        <thead>
          <tr>
            <th style="width:60px">#</th>
            <th>선매출번호</th>
            <th>등록일자</th>
            <th>부서명</th>
            <th>부서담당자</th>
            <th>거래처명</th>
            <th>사업자번호</th>
            <th>거래처담당자</th>
            <th>금액</th>
            <th>차감주문번호</th>
            <th>비고</th>
            <th>결제구분</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="7" style="color:#6b7280;">선매출입력과 <-> 차감 주문번호는 1:1, 1:n인경우 선매출입력은 다르게구성 + 주문에서의 금액이 10,000원인데 선매출금액은 9,000원일때 등 경우의수 체크필요 .</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>


</body>
</html>
