
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>주문관리 > 주문등록</title>

  <link rel="stylesheet" href="../common.css">
  <script defer src="../common.js"></script>
  <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

  <style>
    /* =========================
      주문등록 페이지 전용(스코핑)
      - common.css랑 클래스명 충돌 방지
      - .oc 내부에서만 스타일 적용
    ========================== */
    .oc { font: inherit; color: inherit; }
    .oc * { box-sizing: border-box; }
    .oc input, .oc select, .oc textarea, .oc button { font: inherit; color: inherit; }
    .oc button { cursor: pointer; }

    .oc-titlebar{
      background:#1f6fb2;
      color:#fff;
      padding:18px;
      border-radius:14px;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
      margin-bottom:12px;
      font-weight:900;
      letter-spacing:-.2px;
    }
    .oc-titlebar .crumb{ font-size:18px; }

    .oc-tabs{
      display:flex;
      gap:10px;
      align-items:center;
      border-bottom:1px solid #e6ebf2;
      padding:0 6px 10px;
      margin-bottom:14px;
    }
    .oc-tab{
      padding:10px 14px;
      border-radius:12px;
      user-select:none;
      font-weight:900;
      font-size:14px;
      color:#6b7280;
      border:1px solid transparent;
      background:transparent;
    }
    .oc-tab:hover{ background:#f4f8ff; }
    .oc-tab.active{
      background:#eef6ff;
      color:#155a93;
      border-color:#d7e8ff;
    }

    /* form */
    .oc-form{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px 18px;
      align-items:start;
    }
    .oc-field{
      display:grid;
      grid-template-columns: 160px 1fr;
      gap:10px;
      align-items:center;
      min-height:38px;
    }
    .oc-label{
      font-weight:900;
      font-size:13px;
      color:#111;
      white-space:nowrap;
      background:transparent !important; /* common.css가 label에 배경 주는 경우 방지 */
      border:0 !important;
      padding:0 !important;
      margin:0 !important;
    }
    .oc-req::after{ content:" *"; color:#e11d48; font-weight:900; }

    .oc-ctl{
      width:100%;
      height:36px;
      border:1px solid #d8dee6;
      border-radius:10px;
      padding:0 10px;
      background:#fff;
      font-size:13px;
      outline:none;
      display:block;
    }
    .oc-ctl:focus{
      border-color:#9cc3ea;
      box-shadow:0 0 0 3px rgba(31,111,178,.12);
    }
    .oc-ctl[disabled]{
      background:#f5f6f8;
      color:#6b7280;
    }
    .oc-textarea{
      height:auto;
      min-height:92px;
      padding:10px;
      resize:vertical;
    }

    .oc-row{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .oc-row .oc-ctl{ flex:1; }

    .oc-mini{
      height:36px;
      min-width:42px;
      border-radius:10px;
      border:1px solid #cfe0f5;
      background:#fff;
      font-weight:900;
    }
    .oc-mini:hover{ background:#f6fbff; }

    .oc-split{
      grid-column:1 / -1;
      border-top:1px solid #eef2f7;
      margin:6px 0;
    }

    .oc-checkline{
      display:flex;
      align-items:center;
      gap:10px;
      padding:6px 0;
      font-weight:800;
      font-size:13px;
      color:#374151;
    }
    .oc input[type="checkbox"],
    .oc input[type="radio"]{
      width:auto !important;
      height:auto !important;
      accent-color:#1f6fb2;
    }

    .oc-radio{
      display:flex;
      gap:18px;
      align-items:center;
      font-size:13px;
      font-weight:800;
      color:#374151;
      flex-wrap:wrap;
    }
    .oc-radio label{ display:flex; align-items:center; gap:8px; }

    .oc-actions{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-top:14px;
    }
    .oc-btn{
      height:36px;
      padding:0 14px;
      border-radius:10px;
      font-weight:900;
      font-size:13px;
      border:1px solid transparent;
      white-space:nowrap;
      background:#fff;
    }
    .oc-btn.primary{ background:#1f6fb2; color:#fff; border-color:#1f6fb2; }
    .oc-btn.primary:hover{ filter:brightness(.95); }
    .oc-btn.ghost{ background:#fff; color:#1f6fb2; border-color:#cfe0f5; }
    .oc-btn.ghost:hover{ background:#f6fbff; }
    .oc-btn.success{ background:#18a058; color:#fff; border-color:#18a058; }
    .oc-btn.success:hover{ filter:brightness(.95); }

    /* Work tab */
    .oc-work-layout{
      display:block;
      grid-template-columns: 280px 1fr;
      gap:14px;
      align-items:start;
    }

    .oc-side{
      border:1px solid #e6ebf2;
      border-radius:14px;
      background:#fff;
      overflow:hidden;
    }
    .oc-side-head{
      padding:12px;
      border-bottom:1px solid #eef2f7;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .oc-side-btn{
      height:42px;
      border-radius:10px;
      border:1px solid #bfe6f2;
      background:#14b8d4;
      color:#fff;
      font-weight:900;
      text-align:left;
      padding:0 12px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .oc-side-btn:hover{ filter:brightness(.96); }
    .oc-plus{
      width:24px; height:24px;
      border-radius:999px;
      background:rgba(255,255,255,.25);
      display:grid; place-items:center;
      font-weight:900;
    }

    .oc-work-list{
      padding:8px;
      max-height:520px;
      overflow:auto;
    }
    .oc-work-item{
      border:1px solid #eef2f7;
      border-radius:12px;
      padding:10px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
      background:#fff;
    }
    .oc-work-item.active{
      border-color:#d7e8ff;
      background:#f5f8ff;
    }
    .oc-work-name{
      font-weight:900;
      font-size:13px;
      color:#111;
      line-height:1.2;
    }
    .oc-work-meta{
      font-size:12px;
      color:#6b7280;
      font-weight:800;
      margin-top:2px;
    }
    .oc-del{
      width:28px; height:28px;
      border-radius:8px;
      border:1px solid #f2c2c7;
      background:#fff;
      color:#e11d48;
      font-weight:900;
      display:grid;
      place-items:center;
      flex:0 0 auto;
    }
    .oc-del:hover{ background:#fff5f6; }

    .oc-main{
      border:1px solid #e6ebf2;
      border-radius:14px;
      background:#fff;
      overflow:hidden;
    }
    .oc-main-head{
      padding:12px 14px;
      border-bottom:1px solid #eef2f7;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .oc-main-title{
      font-weight:900;
      font-size:14px;
      color:#111;
    }
    .oc-main-body{ padding:14px; }

    .oc-work-form{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px 18px;
      align-items:start;
      margin-bottom:12px;
    }

    .oc-grid{
      border:1px solid #e6ebf2;
      border-radius:14px;
      overflow:hidden;
      background:#fff;
      margin-top:10px;
    }
    .oc-table{
      width:100%;
      border-collapse:collapse;
    }
    .oc-table thead th{
      background:#f7f9fc;
      font-weight:900;
      font-size:13px;
      padding:10px;
      border-bottom:1px solid #eef2f7;
      text-align:left;
      white-space:nowrap;
    }
    .oc-table tbody td{
      font-size:13px;
      padding:8px 10px;
      border-bottom:1px solid #eef2f7;
      vertical-align:middle;
    }
    .oc-table tbody tr:hover{ background:#fafcff; }

    .oc-cell{
      height:32px;
      border:1px solid #d8dee6;
      border-radius:10px;
      padding:0 8px;
      font-size:13px;
      width:100%;
      outline:none;
      background:#fff;
    }
    .oc-amt{ text-align:right; font-variant-numeric: tabular-nums; }

    .oc-tiny{
      height:32px;
      padding:0 10px;
      border-radius:10px;
      border:1px solid #cfe0f5;
      background:#fff;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }
    .oc-tiny:hover{ background:#f6fbff; }

    .oc-summary{
      display:block;
      grid-template-columns: 1fr 220px;
      gap:10px 18px;
      margin-top:20px;
      align-items:start;
    }
    .oc-sum-right{
      justify-self:end;
      width:260px;
      border:1px solid #eef2f7;
      border-radius:14px;
      padding:12px;
      background:#fbfdff;
    }
    .oc-sum-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:6px 0;
      font-size:13px;
      font-weight:800;
      color:#374151;
    }
    .oc-sum-row strong{ font-variant-numeric: tabular-nums; }
    .oc-sum-row.total{
      border-top:1px solid #e6ebf2;
      margin-top:6px;
      padding-top:10px;
      color:#e11d48;
      font-weight:900;
    }

    .oc-hidden{ display:none; }

    @media (max-width: 980px){
      .oc-form{ grid-template-columns:1fr; }
      .oc-field{ grid-template-columns: 140px 1fr; }
      .oc-work-layout{ grid-template-columns:1fr; }
      .oc-work-form{ grid-template-columns:1fr; }
      .oc-sum-right{ width:100%; justify-self:stretch; }
    }


    .oc-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.oc-modal.active{
  display:flex;
}

.oc-modal-box{
  width:90vw;
  max-width:1400px;
  height:90vh;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
  display:flex;
  flex-direction:column;
}

.oc-modal-body{
  padding:24px;
  overflow:auto;
  flex:1;
}

    .oc-table thead th{
  background:#f1f3f7;
  text-align:center;
  font-weight:900;
}

.oc-table tbody td{
  text-align:center;
}
  </style>
</head>

<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="logo">◎</div>
      <div>ERP UI</div>
    </div>
    <div id="nav-container"></div>
    <div class="userbox">H.Q / 안현모</div>
  </div>
</header>

<main class="app oc">
  <div class="oc-titlebar">
    <div class="crumb">주문관리 &gt; 주문등록</div>
  </div>

  <section class="panel">
    <div class="panel-head">
      <div><div class="panel-title">주문등록</div></div>
    </div>

    <div class="panel-body">

      <!-- Tabs -->
      <div class="oc-tabs">
        <button class="oc-tab active" type="button" data-tab="order">주문정보</button>
        <button class="oc-tab" type="button" data-tab="work">작업정보</button>
      </div>

      <!-- TAB 1: 주문정보 -->
      <div id="tab-order">
        <div class="oc-form">

          <div class="oc-field">
            <div class="oc-label">접수자</div>
            <input class="oc-ctl" value="안현모" disabled />
          </div>

          <div class="oc-field">
            <div class="oc-label oc-req">완료요청일시</div>
            <input class="oc-ctl" type="datetime-local" value="2026-02-05T16:00" />
          </div>

          <div class="oc-field">
            <div class="oc-label oc-req">접수일자</div>
            <input class="oc-ctl" type="date" value="2026-02-02" />
          </div>

          <div class="oc-field">
            <div class="oc-label oc-req">고객명</div>
            <div class="oc-row">
              <input class="oc-ctl" placeholder="고객명으로 검색 후 선택" />
              <button class="oc-mini" type="button" onclick="alert('프로토타입: 고객 검색(팝업)')">≡</button>
            </div>
          </div>

          <div class="oc-field">
            <div class="oc-label oc-req">회사명</div>
            <div class="oc-row">
              <input class="oc-ctl" placeholder="회사명으로 검색 후 선택" />
              <button class="oc-mini" type="button" onclick="alert('프로토타입: 회사 검색(팝업)')">≡</button>
            </div>
          </div>

          <div class="oc-field">
            <div class="oc-label">별도 사업본부 매출</div>
            <select class="oc-ctl">
              <option>그래픽스사업본부</option>
              <option>PM사업본부</option>
              <option>국내사업본부</option>
              <option>해외사업본부</option>
            </select>
          </div>

          <div class="oc-field">
            <div class="oc-label oc-req">영업담당자</div>
            <div class="oc-row">
              <input class="oc-ctl" value="안현모" disabled />
              <button class="oc-mini" type="button" onclick="alert('프로토타입: 영업담당자 검색(팝업)')">≡</button>
            </div>
          </div>

          <div class="oc-field">
            <div class="oc-label">세무구분</div>
            <select class="oc-ctl">
              <option>과세매출</option>
              <option>영세매출</option>
              <option>면세매출</option>
              <option>건별매출</option>
              <option>카드매출</option>
            </select>
          </div>
          
          <div class="oc-field" style="grid-column:1 / -1;">
            <div class="oc-label">특이사항</div>
            <textarea class="oc-ctl oc-textarea" placeholder="외주발주 및 생산중이더라도 매출완료전까지는 회사명,고객명,별도사업,세무구분,영업담당자 수정가능"></textarea>
          </div>
          
        </div>

        <div class="oc-actions">
          <div>
            <button class="oc-btn ghost" type="button" onclick="history.back()">이전</button>
          </div>
          <div style="display:flex; gap:10px;">
            <button class="oc-btn primary" type="button" id="goWork">다음</button>
            <button class="oc-btn success" type="button" onclick="alert('프로토타입: 등록(미정)')">등록</button>
          </div>
        </div>
      </div>

      <!-- TAB 2: 작업정보 -->
<div id="tab-work" class="oc-hidden">

  <div class="oc-work-layout">

    <!-- 좌측 작업 리스트 -->
    <section class="oc-side">
      <div class="oc-side-head">
        <button class="oc-side-btn" id="btnAddWork">
          <span class="oc-plus">+</span> 작업 추가
        </button>
      </div>
      <div class="oc-work-list" id="workList"></div>
    </section>

    <!-- 우측 작업 상세 -->
    <section class="oc-main">

      <div class="oc-main-head">
        <div class="oc-main-title">작업 상세</div>
        <div style="display:flex; gap:8px;">
          <button class="oc-tiny" id="btnAddItem">품목행 추가</button>
          <button class="oc-tiny" id="btnClearItems">품목 초기화</button>
        </div>
      </div>

      <div class="oc-main-body">

        <div class="oc-work-form">
          <div class="oc-field">
            <div class="oc-label">작업명</div>
            <input class="oc-ctl" id="workName">
          </div>

          <div class="oc-field">
            <div class="oc-label">제작부수</div>
            <input class="oc-ctl" id="qtyB" type="number" value="1">
          </div>
        </div>

        <!-- 품목 -->
        <div class="oc-grid">
          <table class="oc-table">
            <thead>
              <tr>
                <th>구분</th>
                <th>구성</th>
                <th>작업명</th>
                <th>수량</th>
                <th>단가</th>
                <th>소계</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody id="itemBody"></tbody>
          </table>
        </div>

        <!-- 합계 -->
        <div class="oc-summary">
          <div></div>
          <div class="oc-sum-right">
            <div class="oc-sum-row">
              <span>작업금액</span>
              <strong id="sumWork">0원</strong>
            </div>
          </div>
        </div>

      </div>
    </section>

  </div>
</div>

    </div>
  </section>
</main>

  <div class="oc-modal" id="orderModal">
  <div class="oc-modal-box">
    <div class="oc-modal-head">
      <div>발주서 작성</div>
      <button id="closeOrderModal">✕</button>
    </div>

    <div class="oc-modal-body">

      <!-- 기본정보 -->
      <div class="oc-work-form" style="margin-bottom:20px;">
        <div class="oc-field">
          <div class="oc-label">수주일</div>
          <input class="oc-ctl" id="modalProductName">
        </div>

        <div class="oc-field">
          <div class="oc-label">제품명</div>
          <input class="oc-ctl" id="modalQty" type="number">
        </div>

        <div class="oc-field">
          <div class="oc-label">규격</div>
          <input class="oc-ctl" placeholder="규격">
        </div>

        <div class="oc-field">
          <div class="oc-label">수량</div>
          <input class="oc-ctl" placeholder="수량">
        </div>

        <div class="oc-field">
          <div class="oc-label">영업담당자</div>
          <input class="oc-ctl" placeholder="영업담당자">
        </div>

        <div class="oc-field">
          <div class="oc-label">납품일</div>
          <input class="oc-ctl" placeholder="ex)20260101">
        </div>
        
        <div class="oc-field" style="grid-column:1/-1;">
            <div class="oc-label">작업주의사항</div>
            <input class="oc-ctl">
          </div>
      </div>

      <!-- 작업사양 (디테일정보 테이블 복사) -->
      <div class="oc-grid">
        <table class="oc-table">
          <thead>
          <tr>
            <th rowspan="2" style="width:120px;">구분</th>
            <th rowspan="2" style="width:120px;">구성</th>
            <th rowspan="2" style="width:120px;">작업명</th>
            <th rowspan="2" style="width:120px;">페이지</th>
            <th colspan="2" style="width:200px;">인쇄도수</th>
            <th rowspan="2" style="width:160px;">비고</th>
            <th rowspan="2" style="width:120px;">업체명</th>
            <th rowspan="2" style="width:80px;">관리</th>
          </tr>
          
          <tr>
            <th style="width:100px;">전</th>
            <th style="width:100px;">후</th>
          </tr>
          </thead>
          <tbody id="orderDetailBody"></tbody>
        </table>
      </div>

      <div style="margin-top:10px;">
        <button class="oc-tiny" type="button" id="btnAddOrderDetail">작업행 추가</button>
      </div>

      <!-- 배송정보 -->
      <div style="margin-top:30px;">
        <div style="font-weight:900; margin-bottom:10px;">배송정보</div>

        <div class="oc-work-form">
          <div class="oc-field">
            <div class="oc-label">배송방법</div>
            <select class="oc-ctl">
              <option>택배</option>
              <option>퀵</option>
              <option>POD배송</option>
              <option>직접수령</option>
            </select>
          </div>
          
          <div class="oc-field">
            <div class="oc-label">받는사람</div>
            <input class="oc-ctl">
          </div>

          <div class="oc-field">
            <div class="oc-label">연락처(핸드폰번호)</div>
            <input class="oc-ctl">
          </div>

          <div class="oc-field" style="grid-column:1/-1;">
          <div class="oc-label">주소</div>
        
          <div class="oc-row">
            <input class="oc-ctl" id="postcode" placeholder="우편번호" readonly style="max-width:120px;">
            <button class="oc-mini" type="button" onclick="execDaumPostcode()">검색</button>
          </div>
        
          <div></div>
          <input class="oc-ctl" id="address" placeholder="기본주소" readonly>
        
          <div></div>
          <input class="oc-ctl" id="detailAddress" placeholder="상세주소">
        </div>
        </div>
      </div>

      <div class="oc-grid">
  <table class="oc-table">
    <thead>
      <tr>
        <th style="width:25%">작성자</th>
        <th style="width:25%">작성시간</th>
        <th style="width:25%">최종수정자</th>
        <th style="width:25%">최종수정시간</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td style="text-align:center;">안현모</td>
        <td style="text-align:center;">-</td>
        <td style="text-align:center;">-</td>
        <td style="text-align:center;">-</td>
      </tr>
    </tbody>
  </table>
</div>

      <!-- 버튼 -->
      <div style="margin-top:30px; text-align:right;">
        <button class="oc-btn ghost" id="closeOrderModal2">취소</button>
        <button class="oc-btn primary" id="saveOrderSheet">저장</button>
      </div>

    </div>
  </div>
</div>

<script>

 /* ================= 기본 ================= */
const tabs = document.querySelectorAll(".oc-tab");
const tabOrder = document.getElementById("tab-order");
const tabWork  = document.getElementById("tab-work");

function openTab(name){
  tabs.forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  tabOrder.classList.toggle("oc-hidden", name !== "order");
  tabWork.classList.toggle("oc-hidden", name !== "work");
}

tabs.forEach(t => t.addEventListener("click", () => openTab(t.dataset.tab)));
document.getElementById("goWork").onclick = () => openTab("work");
document.getElementById("backOrder").onclick = () => openTab("order");

/* ================= 상태 ================= */
let works = [];
let currentWorkIdx = -1;

/* ================= DOM ================= */
const workList = document.getElementById("workList");
const workNameEl = document.getElementById("workName");
const workMemoEl = document.getElementById("workMemo");
const qtyBEl = document.getElementById("qtyB");
const itemBody = document.getElementById("itemBody");

const sumWork = document.getElementById("sumWork");
const sumDisc = document.getElementById("sumDisc");
const sumPay  = document.getElementById("sumPay");

const money = (n) => (Math.round(n)).toLocaleString("ko-KR") + "원";

/* ================= util ================= */
function getWork(){
  return works[currentWorkIdx];
}

/* ================= 작업 추가 ================= */
document.getElementById("btnAddWork").onclick = () => {
  works.push({
    name: "새 작업",
    memo: "",
    qtyB: 1,
    items: [{
      type:"용지",
      code:"",
      name:"",
      rmk:"",
      qtyA:1,
      priceB:0
    }],
    ship:0,
    disc:0
  });

  currentWorkIdx = works.length - 1;

  renderWorkList();
  renderWorkDetail();
};

/* ================= 작업 리스트 ================= */
function renderWorkList(){
  workList.innerHTML = "";

  works.forEach((w, idx) => {
    const div = document.createElement("div");
    div.className = "oc-work-item" + (idx === currentWorkIdx ? " active" : "");

    div.innerHTML = `
      <div>
        <div class="oc-work-name">${w.name || "작업 " + (idx+1)}</div>
      </div>
      <button class="oc-del">×</button>
    `;

    // 선택
    div.onclick = () => {
      currentWorkIdx = idx;
      renderWorkList();
      renderWorkDetail();
    };

    // 삭제
    div.querySelector(".oc-del").onclick = (e) => {
      e.stopPropagation();
      works.splice(idx,1);

      currentWorkIdx = works.length ? 0 : -1;

      renderWorkList();
      renderWorkDetail();
    };

    workList.appendChild(div);
  });
}

/* ================= 작업 상세 ================= */
function renderWorkDetail(){

  if(currentWorkIdx < 0 || !works.length){
    itemBody.innerHTML = "";
    workNameEl.value = "";
    workMemoEl.value = "";
    qtyBEl.value = 1;
    sumWork.textContent = "0원";
    sumDisc.textContent = "0원";
    sumPay.textContent  = "0원";
    return;
  }

  const work = getWork();

  workNameEl.value = work.name;
  workMemoEl.value = work.memo;
  qtyBEl.value = work.qtyB;

  itemBody.innerHTML = "";

  work.items.forEach((it, idx) => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>
        <select class="oc-cell">
          <option value="용지" ${it.type==="용지"?"selected":""}>용지</option>
          <option value="인쇄" ${it.type==="인쇄"?"selected":""}>인쇄</option>
          <option value="후가공" ${it.type==="후가공"?"selected":""}>후가공</option>
          <option value="제본" ${it.type==="제본"?"selected":""}>제본</option>
        </select>
      </td>
      <td><input class="oc-cell" value="${it.code}"></td>
      <td><input class="oc-cell" value="${it.name}"></td>
      <td><input class="oc-cell" value="${it.rmk}"></td>
      <td><input class="oc-cell oc-amt" type="number" value="${it.qtyA}"></td>
      <td><input class="oc-cell oc-amt" type="number" value="${it.priceB}"></td>
      <td class="oc-amt">0원</td>
      <td><button class="oc-tiny">삭제</button></td>
    `;

    const select = tr.querySelector("select");
    const inputs = tr.querySelectorAll("input");

    const qtyInput = inputs[3];
    const priceInput = inputs[4];
    const subTd = tr.children[6];

    function calc(){
      const a = Number(qtyInput.value || 0);
      const b = Number(priceInput.value || 0);
      subTd.textContent = money(a*b);
      recalcSummary();
    }

    select.onchange = () => it.type = select.value;
    inputs[0].oninput = () => it.code = inputs[0].value;
    inputs[1].oninput = () => it.name = inputs[1].value;
    inputs[2].oninput = () => it.rmk  = inputs[2].value;
    inputs[3].oninput = () => { it.qtyA = Number(inputs[3].value); calc(); };
    inputs[4].oninput = () => { it.priceB = Number(inputs[4].value); calc(); };

    tr.querySelector("button").onclick = () => {
      if(work.items.length === 1){
        alert("품목은 최소 1개 필요");
        return;
      }
      work.items.splice(idx,1);
      renderWorkDetail();
    };

    itemBody.appendChild(tr);
    calc();
  });

  recalcSummary();
}

/* ================= 합계 ================= */
function recalcSummary(){
  const work = getWork();
  if(!work) return;

  const A = work.items.reduce((sum, it)=>sum+(it.qtyA*it.priceB),0);
  const C = A * work.qtyB;
  const pay = Math.max(0, C + work.ship - work.disc);

  sumWork.textContent = money(C);
  sumDisc.textContent = money(work.disc);
  sumPay.textContent  = money(pay);
}

/* ================= 이벤트 ================= */
workNameEl.oninput = () => {
  const w = getWork();
  if(!w) return;
  w.name = workNameEl.value;
  renderWorkList();
};

workMemoEl.oninput = () => {
  const w = getWork();
  if(!w) return;
  w.memo = workMemoEl.value;
};

qtyBEl.oninput = () => {
  const w = getWork();
  if(!w) return;
  w.qtyB = Math.max(1, Number(qtyBEl.value));
  recalcSummary();
};

document.getElementById("btnAddItem").onclick = () => {
  const w = getWork();
  if(!w) return;

  w.items.push({
    type:"용지",
    code:"",
    name:"",
    rmk:"",
    qtyA:1,
    priceB:0
  });

  renderWorkDetail();
};

document.getElementById("btnClearItems").onclick = () => {
  const w = getWork();
  if(!w) return;

  w.items = [{
    type:"용지",
    code:"",
    name:"",
    rmk:"",
    qtyA:1,
    priceB:0
  }];

  renderWorkDetail();
};

/* ================= 초기 ================= */
renderWorkList();
renderWorkDetail();

  
</script>
</body>
</html>
