<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>주문관리 > 주문목록</title>

  <!-- 폴더에 넣는 기준: /order/order_list.html -->
  <link rel="stylesheet" href="../common.css">
  <script defer src="../common.js"></script>

  <style>
    .titlebar{
      background:#1f6fb2;
      color:#fff;
      padding:18px 18px;
      border-radius:14px;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
      margin-bottom:12px;
      font-weight:900;
      letter-spacing:-.2px;
    }
    .titlebar .crumb{ font-size:18px; }

    /* toolbar */
    .toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .toolbar-left{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      width:100%;
    }

    .ctl{
      height:36px;
      border:1px solid #d8dee6;
      border-radius:10px;
      padding:0 10px;
      background:#fff;
      font-size:13px;
      outline:none;
    }
    .date{
      width:130px;
    }

    .searchbox{
      display:flex;
      align-items:center;
      gap:8px;
      border:1px solid #d8dee6;
      border-radius:10px;
      padding:0 10px;
      height:36px;
      background:#fff;
      min-width:380px;
      flex: 1 1 380px;
    }
    .searchbox input{
      border:0;
      outline:0;
      width:100%;
      font-size:13px;
      background:transparent;
    }

    .icon-btn{
      height:36px;
      width:42px;
      border-radius:10px;
      border:1px solid #1f6fb2;
      background:#1f6fb2;
      color:#fff;
      cursor:pointer;
      font-weight:900;
    }
    .icon-btn:hover{ filter:brightness(.95); }

    .btns{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      margin-left:auto;
    }
    .btn{
      height:36px;
      padding:0 14px;
      border-radius:10px;
      font-weight:900;
      font-size:13px;
      cursor:pointer;
      border:1px solid transparent;
      white-space:nowrap;
    }
    .btn.primary{ background:#1f6fb2; color:#fff; border-color:#1f6fb2; }
    .btn.primary:hover{ filter:brightness(.95); }
    .btn.success{ background:#18a058; color:#fff; border-color:#18a058; }
    .btn.success:hover{ filter:brightness(.95); }
    .btn.ghost{ background:#fff; color:#1f6fb2; border-color:#cfe0f5; }
    .btn.ghost:hover{ background:#f6fbff; }

    /* grid */
    .grid-wrap{
      border:1px solid #e6ebf2;
      border-radius:14px;
      overflow:hidden;
      background:#fff;
    }
    table{
      width:100%;
      border-collapse:collapse;
    }
    thead th{
      background:#f7f9fc;
      font-weight:900;
      font-size:13px;
      padding:10px 10px;
      border-bottom:1px solid #eef2f7;
      text-align:left;
      white-space:nowrap;
    }
    tbody td{
      font-size:13px;
      padding:10px 10px;
      border-bottom:1px solid #eef2f7;
      vertical-align:middle;
    }
    tbody tr:hover{ background:#fafcff; }

    .num{ width:92px; white-space:nowrap; }
    .w-ord{ width:360px; }
    .w-company{ width:220px; }
    .w-cust{ width:120px; white-space:nowrap; }
    .w-branch{ width:130px; white-space:nowrap; }
    .w-user{ width:90px; white-space:nowrap; }
    .w-amt{ width:120px; text-align:right; font-variant-numeric: tabular-nums; }
    .w-status{ width:110px; white-space:nowrap; }
    .w-mng{ width:90px; }

    .ord-link{
      color:#1f6fb2;
      text-decoration:none;
      font-weight:900;
    }
    .ord-link:hover{ text-decoration:underline; }
    .desc{
      margin-top:2px;
      color:#4b5563;
      font-size:12px;
      line-height:1.35;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      border:1px solid transparent;
    }
    .b-done{ background:#eef6ff; border-color:#d7e8ff; color:#155a93; }   /* 발송완료 */
    .b-sales{ background:#eafaf0; border-color:#cbeed8; color:#0f7a3e; }  /* 매출확정 */

    .mng-btn{
      width:28px;
      height:28px;
      border-radius:6px;
      border:1px solid #cfe0f5;
      background:#fff;
      cursor:pointer;
      display:inline-grid;
      place-items:center;
      margin-right:6px;
    }
    .mng-btn:hover{ background:#f6fbff; }
    .empty{
      padding:16px;
      color:#6b7280;
      font-size:13px;
    }

    @media (max-width: 980px){
      .searchbox{ min-width: 240px; }
      .w-ord{ width:auto; }
    }
  </style>
</head>

<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="logo">◎</div>
      <div>ERP UI</div>
    </div>

    <div id="nav-container"></div>

    <div class="userbox">H.Q / 안현모</div>
  </div>
</header>

<main class="app">
  <div class="titlebar">
    <div class="crumb">주문관리 &gt; 주문목록</div>
  </div>

  <section class="panel">
    <div class="panel-head">
      <div>
        <div class="panel-title">주문목록</div>
      </div>
    </div>

    <div class="panel-body">

      <!-- 조회 영역 -->
      <div class="toolbar">
        <div class="toolbar-left">

          <input class="ctl date" type="date" id="from" value="2026-01-27">
          <input class="ctl date" type="date" id="to" value="2026-02-02">

          <div class="searchbox">
            <input id="q" type="text" placeholder="주문번호, 고객명, 회사명, 접수자, 담당지점으로 검색" />
          </div>
          <button class="icon-btn" id="btnSearch" title="조회">🔍</button>

          <select class="ctl" id="status">
            <option value="">주문상태 (전체)</option>
            <option value="접수대기">접수대기</option>
            <option value="외주발주">외주발주</option>
            <option value="발송완료">발송완료</option>
            <option value="매출등록">매출등록</option>
          </select>

          <select class="ctl" id="status">
            <option value="">작업처 (전체)</option>
            <option value="외주">외주</option>
            <option value="패키지">패키지</option>
            <option value="P&D">P&D</option>
            <option value="구매">구매</option>3
            <option value="POD">POD</option>
          </select>

          <div class="btns">
            <button class="btn ghost" id="btnExcel">엑셀다운로드</button>
          </div>

        </div>
      </div>

      <!-- 그리드 -->
      <div class="grid-wrap">
        <table aria-label="주문목록 그리드">
          <thead>
            <tr>
              <th class="num">#</th>
              <th class="w-ord">주문번호 / 제목</th>
              <th class="w-company">회사명</th>
              <th class="w-cust">고객명</th>
              <th class="w-branch">접수지점</th>
              <th class="w-user">접수자</th>
              <th class="w-user">작업처</th>
              <th class="w-amt">금액</th>
              <th class="w-status">상태</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="9" class="empty">조건을 설정한 뒤 <b>조회</b>를 눌러주세요.</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </section>
</main>

<script>
  // ===== 샘플 데이터(프로토타입) =====
  const rows = [
    {
      id: 10545525,
      ordno: "O2602020001-1",
      title: "[선작업] 출장대행박람 방석주님 스티커 본작업",
      company: "주식회사 일레븐코퍼레이션",
      customer: "정유진",
      branch: "서초로2파트",
      owner: "주인돈",
      job : "외주",
      amount: 168190,
      status: "발송완료",
    },
    {
      id: 10545524,
      ordno: "O2602020001-2",
      title: "[비대면주문] 팝업업체 제작",
      company: "주식회사 우아한형제들",
      customer: "권아람",
      branch: "강남파트",
      owner: "최성현",
      job : "패키지",
      amount: 15400,
      status: "매출확정",
    },
    {
      id: 10545523,
      ordno: "O2602020002-1",
      title: "[비대면주문] 한솥 메뉴판, 교보재 제작",
      company: "(주)한솥",
      customer: "노슬기",
      branch: "강남파트",
      owner: "최성현",
      job : "패키지",
      amount: 493350,
      status: "발송완료",
    },
    {
      id: 10545522,
      ordno: "O2602020003-1",
      title: "[선작업] 출장대행대 제1차 아동권리위원회",
      company: "국가인권위원회",
      customer: "이효진",
      branch: "을지로파트",
      owner: "이지섭",
      job : "P&D",
      amount: 126000,
      status: "매출확정",
    },
    {
      id: 10545521,
      ordno: "O2602020004-1",
      title: "멀로 캐피탈 코리아 엠엔씨 - Monroe | NPS Fund V Finalist Pitc",
      company: "멀로 캐피탈 코리아 엠엔씨",
      customer: "이효준",
      branch: "역삼1파트",
      owner: "김기선",
      job : "외주",
      amount: 198000,
      status: "매출확정",
    },
    {
      id: 10545520,
      ordno: "O2602020005-1",
      title: "[선작업] 출장코리아세븐 김남희님 작업물",
      company: "주식회사 일레븐코퍼레이션",
      customer: "정유진",
      branch: "서초로2파트",
      owner: "주인돈",
      job : "외주",
      amount: 765380,
      status: "매출확정",
    }
  ];

  const tbody = document.getElementById("tbody");
  const qEl = document.getElementById("q");
  const statusEl = document.getElementById("status");
  const btnSearch = document.getElementById("btnSearch");

  const fmt = (n) => n.toLocaleString("ko-KR");

  function badge(status){
    if(status === "발송완료") return `<span class="badge b-done">발송완료</span>`;
    if(status === "매출확정") return `<span class="badge b-sales">매출확정</span>`;
    return status;
  }

  function render(list){
    tbody.innerHTML = "";

    if(!list.length){
      tbody.innerHTML = `<tr><td colspan="9" class="empty">조회 결과가 없습니다.</td></tr>`;
      return;
    }

    list.forEach(r => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="num">${r.id}</td>
        <td class="w-ord">
          <a class="ord-link" href="#" onclick="return false;">[${r.ordno}]</a>
          <div class="desc">${r.title}</div>
        </td>
        <td class="w-company">${r.company}</td>
        <td class="w-cust">${r.customer}</td>
        <td class="w-branch">${r.branch}</td>
        <td class="w-user">${r.owner}</td>
        <td class="w-job">${r.job}</td>
        <td class="w-amt">${fmt(r.amount)}</td>
        <td class="w-status">${badge(r.status)}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function doSearch(){
    const q = qEl.value.trim().toLowerCase();
    const st = statusEl.value;

    let list = rows.slice();

    if(st){
      list = list.filter(r => r.status === st);
    }
    if(q){
      list = list.filter(r => {
        const hay = `${r.ordno} ${r.title} ${r.company} ${r.customer} ${r.branch} ${r.owner}`.toLowerCase();
        return hay.includes(q);
      });
    }
    render(list);
  }

  const chkAll = document.getElementById("chkAll");

function bindCheckAll(){
  if(!chkAll) return;

  chkAll.onchange = () => {
    document.querySelectorAll(".rowChk").forEach(chk => {
      chk.checked = chkAll.checked;
    });
  };
}

function syncCheckAllState(){
  const checks = [...document.querySelectorAll(".rowChk")];
  if(!checks.length || !chkAll) return;
  const allChecked = checks.every(c => c.checked);
  const anyChecked = checks.some(c => c.checked);

  chkAll.indeterminate = anyChecked && !allChecked;
  chkAll.checked = allChecked;
}


  btnSearch.addEventListener("click", doSearch);
  qEl.addEventListener("keydown", (e)=>{ if(e.key==="Enter") doSearch(); });
  statusEl.addEventListener("change", doSearch);

  // 버튼들(프로토타입)
  document.getElementById("btnExcel").addEventListener("click", ()=> alert("프로토타입: 엑셀 다운로드(미정)"));
  document.getElementById("btnConfirm").addEventListener("click", ()=> alert("프로토타입: 매출확정 처리(미정)"));

  bindCheckAll();

  document.querySelectorAll(".rowChk").forEach(chk => {
    chk.addEventListener("change", syncCheckAllState);
  });
  syncCheckAllState();

</script>
</body>
</html>
